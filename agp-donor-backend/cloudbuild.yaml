steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/agp-donor-backend', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/agp-donor-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      ['run', 'deploy', 'agp-donor-backend',
       '--image', 'gcr.io/$PROJECT_ID/agp-donor-backend',
       '--platform', 'managed',
       '--region', 'us-central1',
       '--allow-unauthenticated',
       '--port', '4000']